version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      - "6333:6333"
    environment:
      # Invent your password here!
      - QDRANT__SERVICE__API_KEY=<set_your_api_key>
    volumes:
      # This saves your vectors to a folder called "qdrant_data" right next to the yml file
      - ./qdrant_data:/qdrant/storage