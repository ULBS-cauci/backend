services:

  # ─── Qdrant — Vector Database ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      - "6333:6333"
    environment:
       # Change this before committing or sharing
      - QDRANT__SERVICE__API_KEY=<set_your_api_key>
    volumes:
      - ./qdrant_data:/qdrant/storage

  # ─── PostgreSQL — Relational Database ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # ─── MinIO — S3-Compatible Object Storage ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API  →  set MINIO_ENDPOINT=http://localhost:9000 in .env
      - "9001:9001"   # Web Console  →  http://localhost:9001
    environment:
      - MINIO_ROOT_USER=<set_your_root_user>         # must match MINIO_ACCESS_KEY in .env
      - MINIO_ROOT_PASSWORD=<set_your_root_password> # must match MINIO_SECRET_KEY in .env
    volumes:
      - ./minio_data:/data
