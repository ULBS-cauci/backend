services:

  # ─── Qdrant — Vector Database ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      - "6333:6333"
    environment:
      # This is optional for local development, set it for production deployments
      # - QDRANT__SERVICE__API_KEY=<set_your_api_key>
    volumes:
      - ./data/qdrant_data:/qdrant/storage

  # ─── MinIO — S3-Compatible Object Storage ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API  →  set MINIO_ENDPOINT=http://localhost:9000 in .env
      - "9001:9001"   # Web Console  →  http://localhost:9001
    environment:
      - MINIO_ROOT_USER=user         # Set your root user, must match MINIO_ACCESS_KEY in .env
      - MINIO_ROOT_PASSWORD=password # Set your root password, must match MINIO_SECRET_KEY in .env
    volumes:
      - ./data/minio_data:/data
