services:

  # ─── Qdrant — Vector Database ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      - "6333:6333"
    # Uncomment to set an API key in production:
    # environment:
    #   - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    volumes:
      - ./data/qdrant_data:/qdrant/storage

  # ─── MinIO — S3-Compatible Object Storage ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API  →  set MINIO_ENDPOINT=http://localhost:9000 in .env
      - "9001:9001"   # Web Console  →  http://localhost:9001
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}        # must match MINIO_USER in .env
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}    # must match MINIO_PASSWORD in .env
    volumes:
      - ./data/minio_data:/data

  # ─── PostgreSQL — Relational Database ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data


