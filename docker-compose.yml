services:
  # ─── Qdrant — Vector Database ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      - "6333:6333"
    # Uncomment to set an API key in production:
    # environment:
    #   - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    volumes:
      - ./data/qdrant_data:/qdrant/storage

  # ─── MinIO — S3-Compatible Object Storage ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API  →  set MINIO_ENDPOINT=http://localhost:9000 in .env
      - "9001:9001" # Web Console  →  http://localhost:9001
    environment:
      - MINIO_ROOT_USER=${MINIO_USER} # must match MINIO_USER in .env 
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD} # must match MINIO_PASSWORD in .env
    volumes:
      - ./data/minio_data:/data

  # ─── PostgreSQL — Relational Database ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data

  # ─── Redis — Job Queue (ARQ) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis_queue
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis_data:/data
    command: redis-server --appendonly yes

  # ─── API Server — FastAPI ─────────────────────────────────────────────────
  api:
    build:
      context: .
    container_name: fastapi_server
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio
      - qdrant
    environment:
      - ENVIRONMENT=dev
      - VECTOR_DB_CLIENT_TYPE=${VECTOR_DB_CLIENT_TYPE:-qdrant}
      - EMBEDDING_CLIENT_TYPE=${EMBEDDING_CLIENT_TYPE:-ollama}
      - OBJECT_STORAGE_CLIENT_TYPE=${OBJECT_STORAGE_CLIENT_TYPE:-minio}
      - SPARSE_ENCODER_CLIENT_TYPE=${SPARSE_ENCODER_CLIENT_TYPE:-bge-m3}
      - RERANKER_CLIENT_TYPE=${RERANKER_CLIENT_TYPE:-cross-encoder}
      - LLM_CLIENT_TYPE=${LLM_CLIENT_TYPE:-openai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_SSL=false
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_USER=${MINIO_USER}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
      - MINIO_USE_SSL=false
      - QDRANT_ENDPOINT=http://qdrant:6333
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL}
      - BGEM3_MODEL=${BGEM3_MODEL:-BAAI/bge-m3}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_LLM_MODEL=${OPENAI_LLM_MODEL:-gpt-4o-mini}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.2}
      - CROSS_ENCODER_MODEL=${CROSS_ENCODER_MODEL:-BAAI/bge-reranker-v2-m3}
      - CROSS_ENCODER_SCORE_THRESHOLD=${CROSS_ENCODER_SCORE_THRESHOLD:-0.0}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ─── ARQ Worker — Background Document Ingestion ───────────────────────────
  arq_worker:
    build:
      context: .
    container_name: arq_worker
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
      - minio
      - qdrant
    environment:
      - ENVIRONMENT=dev
      - VECTOR_DB_CLIENT_TYPE=${VECTOR_DB_CLIENT_TYPE:-qdrant}
      - EMBEDDING_CLIENT_TYPE=${EMBEDDING_CLIENT_TYPE:-ollama}
      - OBJECT_STORAGE_CLIENT_TYPE=${OBJECT_STORAGE_CLIENT_TYPE:-minio}
      - SPARSE_ENCODER_CLIENT_TYPE=${SPARSE_ENCODER_CLIENT_TYPE:-bge-m3}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_SSL=false
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_USER=${MINIO_USER}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
      - MINIO_USE_SSL=false
      - QDRANT_ENDPOINT=http://qdrant:6333
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL}
      - BGEM3_MODEL=${BGEM3_MODEL:-BAAI/bge-m3}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    command: arq app.workers.arq_worker.WorkerSettings

volumes:
  huggingface_cache:
